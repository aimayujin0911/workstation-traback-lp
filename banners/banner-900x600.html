<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner 900x600</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .banner {
    width: 900px;
    height: 600px;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    position: relative;
    overflow: hidden;
    background: url('truck-bg.jpg') center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    color: #fff;
  }

  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #e85d2a, #ffb347, #e85d2a);
    z-index: 2;
  }

  .banner-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(4,21,37,0.93) 0%, rgba(10,58,101,0.88) 40%, rgba(13,92,143,0.75) 70%, rgba(26,111,168,0.65) 100%);
  }

  .banner-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 44px 52px 36px;
  }

  .label {
    display: inline-block;
    align-self: flex-start;
    font-size: 24px;
    font-weight: 700;
    color: #ffb347;
    letter-spacing: 1px;
    border: 2px solid rgba(255,179,71,0.45);
    padding: 10px 28px;
    border-radius: 50px;
    margin-bottom: 16px;
  }

  .main-copy {
    font-size: 48px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .main-highlight {
    display: block;
    font-size: 86px;
    font-weight: 900;
    background: linear-gradient(135deg, #ffb347, #ff8f1c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.05;
    margin-bottom: 16px;
    letter-spacing: -4px;
  }

  .points {
    list-style: none;
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .points li {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 16px 24px;
    border-radius: 12px;
  }
  .points li .icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #ffb347, #ff8f1c);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    color: #fff;
  }

  .bottom {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e85d2a, #f07b4f);
    color: #fff;
    font-size: 34px;
    font-weight: 700;
    padding: 22px 60px;
    border-radius: 14px;
    text-decoration: none;
    box-shadow: 0 6px 24px rgba(232,93,42,0.4);
    white-space: nowrap;
  }
  .sub-info {
    font-size: 18px;
    font-weight: 600;
    opacity: 0.6;
  }
  .logo-text {
    margin-left: auto;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.4;
    letter-spacing: 1px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="banner-overlay"></div>
  <div class="accent-line"></div>
  <div class="banner-content">
    <div class="label">リースバック・新規リース専門</div>
    <div class="main-copy">トラックはそのまま、</div>
    <div class="main-highlight">資金だけ手元に。</div>

    <ul class="points">
      <li><span class="icon">&#10003;</span>車両価値を査定して資金に変える</li>
      <li><span class="icon">&#10003;</span>持つより借りる時代・財務改善</li>
    </ul>

    <div class="bottom">
      <a href="#" class="cta-btn">無料相談はこちら</a>
      <div class="logo-text">トラバック｜株式会社ワークステーション</div>
    </div>
  </div>
</div>
</body>
</html>
